{{- $key := .Site.Params.googleMapsKey -}}
{{- $q := .Get "q" -}}

{{- if $key -}}
<div class="google-map">
    <iframe
        width="100%"
        height="450"
        style="border:0"
        loading="lazy"
        allowfullscreen
        src="https://www.google.com/maps/embed/v1/place?key={{ $key }}&q={{ $q | urlquery }}">
    </iframe>
</div>
{{- else -}}
    <!-- This will show in your local browser if the Key is missing -->
    <p style="color: red;">Map Error: googleMapsKey not found in hugo.yaml params</p>
{{- end -}}
