<div class="talk-item" style="display: flex; justify-content: space-between; align-items: center; font-size: 0.9em; margin-top: 8px; color: #666;">
    <div class="talk-left">
        <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" style="vertical-align: middle; margin-bottom: 2px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        {{ .Get "year" }} &nbsp;&middot;&nbsp; {{ .Get "source" }}
    </div>
    <div class="talk-right" style="display: flex; align-items: center; gap: 5px;">
        {{ partial "svg.html" (dict "name" "location") }}
        {{ .Get "location"  | safeHTML }}
    </div>
</div>
